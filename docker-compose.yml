name: trust-runtime

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trust_runtime
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust -d trust_runtime"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - trust-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

volumes:
  trust-postgres:
